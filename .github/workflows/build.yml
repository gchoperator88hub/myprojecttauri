name: Build Tauri Windows App

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      # 🔥 FIX: generate valid icon (NO external tools, fully reliable)
      - name: Create valid icon.ico
        shell: powershell
        run: |
          Add-Type -AssemblyName System.Drawing

          $bmp = New-Object System.Drawing.Bitmap 256,256
          $g = [System.Drawing.Graphics]::FromImage($bmp)

          $g.Clear([System.Drawing.Color]::DodgerBlue)
          $font = New-Object System.Drawing.Font("Arial", 72)
          $brush = [System.Drawing.Brushes]::White

          $g.DrawString("APP", $font, $brush, 30, 70)

          if (!(Test-Path "src-tauri\icons")) {
            New-Item -ItemType Directory -Path "src-tauri\icons"
          }

          $bmp.Save("src-tauri\icons\icon.png", [System.Drawing.Imaging.ImageFormat]::Png)
          $bmp.Save("src-tauri\icons\icon.ico", [System.Drawing.Imaging.ImageFormat]::Png)

          $g.Dispose()
          $bmp.Dispose()

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 🔥 FIX: correct Tauri v2 CLI usage
      - name: Build Tauri Windows App (.exe)
        run: npx @tauri-apps/cli@latest tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/